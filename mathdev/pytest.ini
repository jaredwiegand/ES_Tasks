[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (no kernel or server required)
    integration: Integration tests (require running server)
    kernel: Tests requiring /dev/mathdev
    slow: Tests that take more than a few seconds
